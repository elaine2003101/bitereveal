services:
  - type: web
    name: bitereveal-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: AI_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: ALLOWED_ORIGINS
        value: https://elaine2003101.github.io,http://localhost:5173
